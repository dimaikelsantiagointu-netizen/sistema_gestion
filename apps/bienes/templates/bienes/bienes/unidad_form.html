{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-8">
    <div class="mb-8">
        <a href="{% url 'bienes:bien_list' %}" class="text-[10px] font-black text-gray-400 uppercase tracking-widest hover:text-intu-red transition-colors">
            <i class="fas fa-arrow-left mr-1"></i> Volver al Inventario
        </a>
        <h1 class="text-3xl font-black text-intu-blue uppercase tracking-tighter mt-2">{{ titulo }}</h1>
        <div class="h-1.5 w-16 bg-intu-red mt-2 rounded-full"></div>
    </div>

    <div class="bg-white rounded-[2.5rem] shadow-xl border border-gray-100 overflow-hidden">
        <form method="post" id="unidadForm" class="p-10 space-y-6" data-parroquias-url="{% url 'bienes:ajax_load_parroquias' %}">
            {% csrf_token %}
            
            <div>
                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 block">Nombre de la Unidad / Oficina</label>
                <input type="text" name="nombre" required 
                       class="w-full bg-gray-50 border-none rounded-2xl px-5 py-4 text-sm font-bold text-gray-700 focus:ring-2 focus:ring-blue-500 transition-all"
                       placeholder="Ej: Gerencia de Informática">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 block">Estado</label>
                    <select name="estado" id="id_estado" required 
                            class="w-full bg-gray-50 border-none rounded-2xl px-5 py-4 text-sm font-bold text-gray-700 focus:ring-2 focus:ring-blue-500 transition-all">
                        <option value="">Seleccione un estado</option>
                        {% for estado in estados_list %}
                            <option value="{{ estado.id }}">{{ estado.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 block">Parroquia</label>
                    <select name="parroquia" id="id_parroquia" required disabled
                            class="w-full bg-gray-50 border-none rounded-2xl px-5 py-4 text-sm font-bold text-gray-700 focus:ring-2 focus:ring-blue-500 transition-all disabled:opacity-50">
                        <option value="">Seleccione un estado primero</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 block">Dirección Específica</label>
                <textarea name="direccion" rows="3" required
                          class="w-full bg-gray-50 border-none rounded-2xl px-5 py-4 text-sm font-bold text-gray-700 focus:ring-2 focus:ring-blue-500 transition-all"
                          placeholder="Calle, Piso, Nro de oficina..."></textarea>
            </div>

            <div class="pt-4">
                <button type="submit" 
                        class="w-full bg-intu-blue text-white py-5 rounded-2xl font-black text-xs uppercase tracking-[0.2em] hover:bg-opacity-90 transition-all shadow-lg shadow-blue-200">
                    Guardar Nueva Unidad
                </button>
            </div>
        </form>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    $("#id_estado").change(function () {
        const url = $("#unidadForm").attr("data-parroquias-url");
        const estadoId = $(this).val();
        const $parroquiaSelect = $("#id_parroquia");

        $parroquiaSelect.prop('disabled', true).html('<option value="">Cargando parroquias...</option>');

        if (!estadoId) {
            $parroquiaSelect.html('<option value="">Seleccione un estado primero</option>');
            return;
        }

        $.ajax({
            url: url,
            data: { 'estado_id': estadoId },
            dataType: 'json', 
            success: function (data) {
                let options = '<option value="">Seleccione una parroquia</option>';
                
                if (data.length === 0) {
                    options = '<option value="">No hay parroquias disponibles</option>';
                } else {
                    data.forEach(function (parroquia) {
                        options += `<option value="${parroquia.id}">${parroquia.nombre}</option>`;
                    });
                }
                
                $parroquiaSelect.html(options);
                if (data.length > 0) $parroquiaSelect.prop('disabled', false);
            },
            error: function() {
                $parroquiaSelect.html('<option value="">Error en el servidor</option>');
            }
        });
    });
</script>
{% endblock %}
